<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 32" fill="none">
  <!-- DH monogram mark: two overlapping rounded squares suggesting data clarity -->
  <rect x="2" y="6" width="14" height="14" rx="4" fill="#1D4ED8" opacity="0.2"/>
  <rect x="8" y="12" width="14" height="14" rx="4" fill="#1D4ED8" opacity="0.45"/>
  <rect x="5" y="9" width="14" height="14" rx="4" fill="none" stroke="#1D4ED8" stroke-width="1.5"/>
  <!-- Wordmark -->
  <text x="30" y="20" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#0F172A" letter-spacing="-0.03em">Data Hygienics</text>
</svg>
